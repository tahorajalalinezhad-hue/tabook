<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ورود | طابوک</title>

  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <script src="js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      font-family: 'Vazirmatn', sans-serif;
      background-color: #f8f9fa;
    }

    .link-box a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: bold;
    }

    .link-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <header class="bg-primary text-white text-center py-4 shadow-sm mb-5">
    <h1 class="h3 fw-bold">ورود به اکانت طابوک</h1>
    <p class="mb-0 opacity-75">لطفاً اطلاعات خود را وارد کنید</p>
  </header>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">

        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-4 p-md-5">

            <h2 class="text-center mb-4 text-primary fw-bold">
              فرم ورود کاربران
            </h2>

            <form id="hotelForm">

              <div class="row g-3">


                <div class="col-md-6">
                  <label for="name" class="form-label fw-bold">
                    نام و نام خانوادگی
                  </label>
                  <input type="text" class="form-control" id="name" placeholder="مثلاً: علی رضایی"required>
                </div>


                <div class="col-md-6">
                  <label for="phone" class="form-label fw-bold">
                    شماره تماس
                  </label>
                  <input type="tel" class="form-control" id="phone" placeholder="0912..." required>
                </div>


                <div class="col-md-6">
                  <label for="email" class="form-label fw-bold">
                    ایمیل
                  </label>
                  <input type="email" class="form-control" id="email" placeholder="example@gmail.com">
                </div>


                <div class="col-md-6">
                  <label for="password" class="form-label fw-bold">
                    رمز عبور
                  </label>
                  <input type="password" class="form-control" id="password" placeholder="رمز عبور خود را وارد کنید" required>
                </div>


                <div class="col-12 text-center mt-3 link-box">
                  <p class="mb-2">
                    <a href="sighin.html">آیا اکانت ندارید؟ ثبت‌نام کنید</a>
                  </p>

                  <p class="mb-0">
                    <a href="newpass.html">آیا رمز عبور خود را فراموش کرده‌اید؟</a>
                  </p>
                </div>


                <div class="col-12">
                  <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-sm">ورود</button>
                  </div>
                </div>

              </div>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- مودال موفقیت -->
  <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">

        <div class="modal-header border-0 justify-content-center">
          <h5 class="modal-title fw-bold text-success fs-4">ورود با موفقیت انجام شد!</h5>
        </div>

        <div class="modal-body">
          <div class="mb-3">
            <span class="display-6 text-success">🎉</span>
          </div>

          <p class="fs-5 fw-bold" id="welcomeMessage"></p>

          <p class="text-muted">به طابوک خوش آمدید.</p>
        </div>

        <div class="modal-footer border-0 justify-content-center">
          <button type="button"class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">متوجه شدم</button>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.getElementById('hotelForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const name = document.getElementById('name').value;

      document.getElementById('welcomeMessage').innerText =
        `خوش آمدید ${name}، ورود شما با موفقیت انجام شد.`;

      const modal = new bootstrap.Modal(
        document.getElementById('successModal')
      );

      modal.show();
    });
  </script>

</body>
</html>
