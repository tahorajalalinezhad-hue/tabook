<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>خرید اشتراک|طابوک</title>

<link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <script src="js/bootstrap.bundle.min.js"></script>


<style>

body{
    background:#f4f6f9;
    font-family:tahoma;
}

.page-title{
    text-align:center;
    margin:40px 0;
    font-weight:bold;
    color:#1e3a8a;
}

.plan-card{
    border:2px solid #e5e7eb;
    border-radius:20px;
    padding:25px;
    background:#fff;
    transition:.3s;
    cursor:pointer;
    height:100%;
}

.plan-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.plan-card input{
    transform:scale(1.3);
}

.plan-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.old-price{
    color:#000;
    text-decoration:line-through;
    font-size:18px;
}

.new-price{
    color:red;
    font-size:24px;
    font-weight:bold;
}

.discount{
    color:red;
    font-weight:bold;
}

.btn-pay{
    width:250px;
    height:50px;
    font-size:18px;
    font-weight:bold;
}

.gateway-box{
    display:none;
    margin-top:40px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 25px rgba(0,0,0,.08);
}

.gateway-header{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#1e3a8a;
    margin-bottom:25px;
}

.bank-logo{
    text-align:center;
    font-size:18px;
    color:#555;
    margin-bottom:25px;
}

.captcha-box{
    background:#f8f9fa;
    border:1px solid #ddd;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-size:22px;
    letter-spacing:5px;
    font-weight:bold;
}

</style>
</head>

<body>

    <header class="bg-primary text-white text-center py-4 shadow-sm mb-5">
        <h1 class="h3 fw-bold">خرید اشتراک طابوک</h1>
        <p class="mb-0 opacity-75">لطفاً اشتراک مدنظر خود را انتخاب کنید</p>
      </header>

<div class="row g-4">

<div class="col-md-3">
<label class="plan-card w-100">
<input type="radio" name="plan" value="1 ماهه">

<div class="plan-title">
اشتراک 1 ماهه
</div>

<div class="old-price">
550,000 تومان
</div>

<div class="new-price">
385,000 تومان
</div>

<div class="discount">
30٪ تخفیف
</div>
</label>
</div>

<div class="col-md-3">
<label class="plan-card w-100">
<input type="radio" name="plan" value="3 ماهه">

<div class="plan-title">اشتراک 3 ماهه</div>

<div class="old-price">750,000 تومان</div>

<div class="new-price">525,000 تومان</div>

<div class="discount">30٪ تخفیف</div>
</label>
</div>

<div class="col-md-3">
<label class="plan-card w-100">
<input type="radio" name="plan" value="6 ماهه">

<div class="plan-title">اشتراک 6 ماهه</div>

<div class="old-price">950,000 تومان</div>

<div class="new-price">665,000 تومان</div>

<div class="discount">30٪ تخفیف</div>
</label>
</div>

<div class="col-md-3">
<label class="plan-card w-100">
<input type="radio" name="plan" value="1 ساله">

<div class="plan-title">اشتراک 1 ساله</div>

<div class="old-price">1,550,000 تومان</div>

<div class="new-price">1,085,000 تومان</div>

<div class="discount">30٪ تخفیف</div>
</label>
</div>

</div>

<div class="text-center mt-5">
<button onclick="showGateway()" class="btn btn-primary btn-pay">ثبت و ادامه پرداخت</button>
</div>

<div id="gateway" class="gateway-box">

<div class="gateway-header">درگاه پرداخت اینترنتی</div>

<div class="bank-logo">پرداخت امن شاپرک</div>

<div class="row g-3">

<div class="col-md-12">
<label class="form-label">شماره کارت</label>
<input type="text" class="form-control" placeholder="6037-xxxx-xxxx-xxxx">
</div>

<div class="col-md-6">
<label class="form-label">CVV2</label>
<input type="password" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">تاریخ انقضا</label>
<input type="text" class="form-control" placeholder="MM/YY">
</div>

<div class="col-md-12">
<label class="form-label">رمز پویا</label>
<input type="password" class="form-control">
</div>

<div class="col-md-8">
<label class="form-label">کد اعتبارسنجی</label>
<input type="text" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">تصویر امنیتی</label>
<div class="captcha-box">8K5P</div>
</div>

<div class="col-md-12 mt-3">
<button class="btn btn-primary w-100">پرداخت و تکمیل خرید  </button>
</div>

</div>

</div>

</div>

<script>

function showGateway(){

let selected =
document.querySelector('input[name="plan"]:checked');

if(!selected){
    alert("لطفا یک اشتراک انتخاب کنید");
    return;
}

document.getElementById("gateway").style.display="block";

document.getElementById("gateway")
.scrollIntoView({
    behavior:"smooth"
});

}

</script>

</body>
</html>
