<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ثبت نام|طابوک</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <script src="js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      font-family: 'Vazirmatn', sans-serif;
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>


  <header class="bg-primary text-white text-center py-4 shadow-sm mb-5">
    <h1 class="h3 fw-bold">فرم ثبت‌نام</h1>
    <p class="mb-0 opacity-75">لطفاً اطلاعات خود را با دقت وارد کنید</p>
  </header>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">
        
        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-4 p-md-5">
            <h2 class="text-center mb-4 text-primary fw-bold">اطلاعات شما</h2>
            
            <form id="hotelForm" class="needs-validation" novalidate>
              
              <div class="row g-3">

                <div class="col-md-6">
                  <label for="name" class="form-label fw-bold">نام و نام خانوادگی</label>
                  <input type="text" class="form-control" id="name" placeholder="مثلاً: علی رضایی" required>
                </div>


                <div class="col-md-6">
                  <label for="phone" class="form-label fw-bold">شماره تماس</label>
                  <input type="tel" class="form-control" id="phone" placeholder="0912..." required>
                </div>


                <div class="col-md-6">
                  <label for="email" class="form-label fw-bold">ایمیل</label>
                  <input type="email" class="form-control" id="email" placeholder="example@mail.com">
                </div>


                <div class="col-md-6">
                  <label for="password" class="form-label fw-bold">رمز عبور</label>
                  <input type="password" class="form-control" id="password" placeholder="رمز عبور خود را وارد کنید" required>
                </div>


                <div class="col-md-6">
                  <label for="passwordagain" class="form-label fw-bold">تکرار رمز عبور</label>
                  <input type="password" class="form-control" id="passwordagain" placeholder="تکرار رمز عبور" required>
                </div>


                <div class="col-md-6">
                  <label for="jensiat" class="form-label fw-bold">جنسیت</label>
                  <select class="form-select" id="jensiat" required>
                    <option value="" selected disabled>لطفاً انتخاب کنید...</option>
                    <option value="male">آقا</option>
                    <option value="female">خانم</option>
                  </select>
                </div>


                <div class="col-12">
                  <label for="note" class="form-label fw-bold">آدرس</label>
                  <textarea class="form-control" id="note" rows="3" placeholder="آدرس محل زندگی خود را به همراه کد پستی بنویسید..."></textarea>
                </div>
              </div>


              <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-sm">
                  ثبت 
                </button>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <div class="modal-header border-0 justify-content-center">
          <h5 class="modal-title fw-bold text-success fs-4">ثبت نام با موفقیت انجام شد!</h5>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <span class="display-6 text-success">🎉</span>
          </div>
          <p class="fs-5 fw-bold" id="welcomeMessage">
          </p>
          <p class="text-muted">امیدواریم از خرید خود لذت ببرید.</p>
        </div>
        <div class="modal-footer border-0 justify-content-center">
          <button type="button" class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">متوجه شدم</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById('hotelForm').addEventListener('submit', function(event) {
      event.preventDefault();
		
      const name = document.getElementById('name').value;
      const gender = document.getElementById('jensiat').value;
      
      let title = "";
      if (gender === 'male') {
        title = "آقا";
      } else if (gender === 'female') {
        title = "خانم";
      }

      const message = `خوش آمدید ${title} ${name}،\nاطلاعات شما با موفقیت ثبت شد.`;
      
      document.getElementById('welcomeMessage').innerText = message;

      const modal = new bootstrap.Modal(document.getElementById('successModal'));
      modal.show();
		
    });
  </script>

</body>
</html>
