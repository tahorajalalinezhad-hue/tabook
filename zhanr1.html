    function filterBooks() {
      const selectedGenre = document.getElementById('genreSelect').value;
      const container = document.getElementById('booksContainer');
      const noResult = document.getElementById('noResult');
      
      container.innerHTML = '';
      
      if (!selectedGenre) {
        noResult.classList.add('d-none');
        return;
      }

      const filteredBooks = booksData.filter(book => book.genre === selectedGenre);

      if (filteredBooks.length === 0) {
        noResult.classList.remove('d-none');
      } else {
        noResult.classList.add('d-none');
        
        filteredBooks.forEach(book => {
           
          const bookHTML = `
            <div class="col-12">
              <div class="card h-100 shadow-sm border-0">
                <div class="card-body p-0">
                  <div class="row g-0 align-items-center">
                    
                    <div class="col-md-3 text-center p-3">
                      <img src="${book.image}" class="img-fluid rounded-start w-100" style="max-height: 300px; object-fit: cover;" alt="${book.title}">
                    </div>
                    
                    <div class="col-md-5 text-center text-md-start p-3">
                      <h5 class="card-title fw-bold mb-1 fs-5 text-primary">${book.title}</h5>
                      <p class="card-text text-muted mb-0 small">نویسنده: ${book.author}</p>
                    </div>
                    
                    <div class="col-md-4 text-center text-md-end p-3 border-start border-2 border-light">
                      <span class="d-block fw-bold fs-5 text-success mb-2">${book.price} تومان</span>
                      
                      <div class="d-flex justify-content-center justify-content-md-end align-items-center gap-2 mb-2">
                        <button class="btn btn-outline-secondary btn-sm rounded-circle" onclick="updateQty(${book.id}, 1)">+</button>
                        <input type="number" id="qty-${book.id}" class="form-control text-center border-secondary" value="1" style="width: 50px;" readonly>
                        <button class="btn btn-outline-secondary btn-sm rounded-circle" onclick="updateQty(${book.id}, -1)">-</button>
                      </div>
                      
                      <button class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow-sm" onclick="addToCart(${book.id})">
                        افزودن به سبد خرید 🛒
                      </button>
                    </div>
                    
                  </div>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += bookHTML;
        });
      }
    }

    function updateQty(id, change) {
      const input = document.getElementById(`qty-${id}`);
      let currentVal = parseInt(input.value);
      let newVal = currentVal + change;
      
      if (newVal < 1) newVal = 1;
      input.value = newVal;
    }

    function addToCart(id){

      const qty =
      parseInt(
      document.getElementById(`qty-${id}`).value
      );
      
      const book =
      booksData.find(
      b => b.id === id
      );
      
      let cart =
      JSON.parse(
      localStorage.getItem("cart")
      ) || [];
      
      const existing =
      cart.find(
      item => item.id === id
      );
      
      if(existing){
      
      existing.qty += qty;
      
      }else{
      
      cart.push({
      
      id:book.id,
      title:book.title,
      price:book.price,
      image:book.image,
      qty:qty
      
      });
      
      }
      
      localStorage.setItem(
      "cart",
      JSON.stringify(cart)
      );
      
      renderCart();
      
      new bootstrap.Offcanvas(
      document.getElementById("cartSidebar")
      ).show();
      
      }
      function renderCart(){

        let cart =
        JSON.parse(
        localStorage.getItem("cart")
        ) || [];
        
        let html = "";
        let total = 0;
        
        cart.forEach(item=>{
        
        const price =
        parseInt(
        item.price.replace(/,/g,'')
        );
        
        const subtotal =
        price * item.qty;
        
        total += subtotal;
        
        html += `
        
        <div class="card mb-2">
        
        <div class="card-body">
        
        <h6 class="fw-bold">
        ${item.title}
        </h6>
        
        <p>
        تعداد:
        ${item.qty}
        </p>
        
        <p class="text-success fw-bold">
        
        ${subtotal.toLocaleString()}
        تومان
        
        </p>
        
        </div>
        
        </div>
        
        `;
        
        });
        
        if(cart.length===0){
        
        html =
        '<p class="text-muted">سبد خرید خالی است</p>';
        
        }
        
        document.getElementById(
        "cartItems"
        ).innerHTML = html;
        
        document.getElementById(
        "cartCount"
        ).innerText = cart.length;
        
        document.getElementById(
        "cartTotal"
        ).innerText =
        "جمع کل: "
        +
        total.toLocaleString()
        +
        " تومان";
        
        }
        
        renderCart();
  </script>

  <div class="offcanvas-header">
  
  <h5 class="offcanvas-title">

  </h5>
  
  <button
  type="button"
  class="btn-close"
  data-bs-dismiss="offcanvas">
  </button>
  
  </div>

  class="offcanvas-body"
  id="cartItems">
  
  <p class="text-muted">
  سبد خرید خالی است
  </p>
  
  </div>
  
  <div class="p-3 border-top">
  
  <h6 id="cartTotal">
  جمع کل: 0 تومان
  </h6>

  href="cart.html"
  class="btn btn-primary w-100">
  
  مشاهده سبد خرید
  
  </a>
  
  </div>
